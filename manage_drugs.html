<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hub Clínico - Gestionar Fármacos</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css?v=20260307r">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="modules/hubTools.js?v=20260306l"></script>
    <script src="modules/utils.js?v=20260306l"></script>
    <script src="modules/fieldNormalizer.js?v=20260306l"></script>
    <script src="modules/mockPatients.js?v=20260306l"></script>
    <script src="modules/dataManager.js?v=20260307r"></script>
    <script src="modules/exportManager.js?v=20260306l"></script>
    <script src="script.js?v=20260307r"></script>
    <script src="scripts/script_manage_drugs.js?v=20260306l"></script>
</head>
<body>
    <div class="hub-shell">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo-circle"><span class="logo-text">HC</span></div>
                <h1 class="sidebar-title">Hub Clínico<br>Reumatología</h1>
            </div>

            <div class="user-block">
                <i class="fas fa-user-circle user-icon" aria-hidden="true"></i>
                <span class="user-name" id="currentProfessional"></span>
                <button type="button" class="logout-btn" id="logoutBtn" aria-label="Cerrar sesión">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>

            <div class="search-container">
                <input type="text" id="patientSearch" class="search-input" placeholder="Buscar paciente por ID..." autocomplete="off">
                <i class="fas fa-search search-icon" aria-hidden="true"></i>
                <button type="button" class="clear-search hidden" id="clearPatientSearch" aria-label="Limpiar búsqueda">
                    <i class="fas fa-times-circle"></i>
                </button>
            </div>

            <div class="sidebar-nav-area">
            <div class="nav-section">
                <h3 class="nav-title">Consulta</h3>
                <ul class="nav-list">
                    <li><a href="index.html" class="nav-link" data-nav-link><i class="fas fa-home"></i>Inicio</a></li>
                    <li><a href="primera_visita.html" class="nav-link" data-nav-link><i class="fas fa-plus-circle"></i>Nueva Visita</a></li>
                    <li><a href="seguimiento.html" class="nav-link" data-nav-link><i class="fas fa-clipboard-list"></i>Visita de Seguimiento</a></li>
                </ul>
            </div>

            <div class="nav-section">
                <h3 class="nav-title">Gestión</h3>
                <ul class="nav-list">
                    <li><a href="estadisticas.html" class="nav-link" data-nav-link><i class="fas fa-chart-bar"></i>Estadísticas</a></li>
                    <li><a href="manage_drugs.html" class="nav-link" data-nav-link><i class="fas fa-pills"></i>Fármacos</a></li>
                    <li><a href="manage_professionals.html" class="nav-link" data-nav-link><i class="fas fa-users"></i>Profesionales</a></li>
                </ul>
            </div>

            </div>
            <div class="db-status-indicator db-status-indicator--empty" id="dbStatusIndicator" role="status" title="Clic para cargar/recargar BD">
                <i class="fas fa-database db-status-indicator__icon" id="dbStatusIcon"></i>
                <div class="db-status-indicator__text">
                    <span class="db-status-indicator__label" id="dbStatusLabel">BD no cargada</span>
                    <span class="db-status-indicator__time" id="dbStatusTime"></span>
                </div>
            </div>
            <div class="sidebar-footer">v. 1.0.0</div>
        </aside>
        <main class="main-content">
            <section class="dashboard-card">
                <h2>Gestionar Fármacos</h2>
                <form id="addForm">
                    <input type="text" id="drugName" placeholder="Nombre del fármaco" required>
                    <select id="drugCategory" required>
                        <option value="FAME">FAME</option>
                        <option value="Biológico">Biológico</option>
                        <option value="Sistémico">Sistémico</option>
                    </select>
                    <button type="submit">Añadir</button>
                </form>
                <table id="listTable">
                    <thead>
                        <tr>
                            <th>Nombre</th>
                            <th>Categoría</th>
                            <th>Acción</th>
                        </tr>
                    </thead>
                    <tbody id="listBody">
                    </tbody>
                </table>
                <button id="copyToClipboardBtn" class="button primary-button">Copiar Lista al Portapapeles</button>
            </section>
        </main>
    </div>
</body>
</html>
